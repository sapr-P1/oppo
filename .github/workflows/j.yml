on: [push]
jobs:
  find:
    runs-on: self-hosted
    permissions:
      id-token: write
    steps:
      - name: Test OIDC token against runner endpoints
        run: |
          echo "=== Get OIDC request token ==="
          echo "Request token length: ${#ACTIONS_ID_TOKEN_REQUEST_TOKEN}"
          echo "Request URL: $ACTIONS_ID_TOKEN_REQUEST_URL"

          echo ""
          echo "=== Test request token directly against runner endpoint ==="
          curl -s -w "\nHTTP: %{http_code}" -X POST \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/runners/remove-token

          echo ""
          echo "=== Fetch OIDC token with github.com audience ==="
          OIDC_TOKEN=$(curl -s \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api.github.com" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('value','no value'))")

          echo "OIDC token length: ${#OIDC_TOKEN}"

          echo ""
          echo "=== Test OIDC token against runner endpoint ==="
          curl -s -w "\nHTTP: %{http_code}" -X POST \
            -H "Authorization: bearer $OIDC_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/runners/remove-token

          echo ""
          echo "=== Decode OIDC token claims ==="
          echo $OIDC_TOKEN | cut -d. -f2 | base64 -d 2>/dev/null | python3 -m json.tool 2>/dev/null
